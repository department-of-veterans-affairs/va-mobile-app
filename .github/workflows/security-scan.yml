# Scans PRs for package.json dependency changes. Detects added,
# changed, or removed packages, runs GuardDog security analysis, generates a
# detailed review summary, and requires manual approval for dependency changes
# via the bypass-package-lock environment protection.

name: '[Security] Package Dependency Security Check'

on:
  pull_request:

jobs:
  check_approval_label:
    name: Check PR for existing approval label
    runs-on: ubuntu-latest
    outputs:
      has_approval_label: ${{ steps.check.outputs.has_approval_label }}
    steps:
      - name: Check for package-scan-complete label
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # Default to false for non-PR events
          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            echo "has_approval_label=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}

          # Retry the GitHub API call up to 3 times with exponential backoff and check HTTP status
          RETRIES=3
          SLEEP=2
          RESP=""
          for i in $(seq 1 $RETRIES); do
            # Capture body + HTTP code appended
            RAW=$(curl -s -w "%{http_code}" -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}")
            HTTP_CODE="${RAW: -3}"
            BODY="${RAW%???}"
            if [ "$HTTP_CODE" = "200" ]; then
              RESP="$BODY"
              break
            fi
            sleep $SLEEP
            SLEEP=$((SLEEP * 2))
          done

          if [ -z "$RESP" ]; then
            echo "has_approval_label=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$RESP" | python3 -c 'import json,sys;resp=json.load(sys.stdin);labels=[l.get("name","") for l in resp.get("labels",[])];print("has_approval_label=true" if "package-scan-complete" in labels else "has_approval_label=false")' >> "$GITHUB_OUTPUT"

  check_for_locked_file_changes:
    name: Check for package-lock changes
    needs: check_approval_label
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
      has_node: ${{ steps.detect-node.outputs.has_node }}
      alert_lines: ${{ steps.changed-files.outputs.alert_lines }}
      app_token: ${{ steps.generate_token.outputs.token }}
    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLAGSHIP_MOBILE_APP_ID }}
          private-key: ${{ secrets.FLAGSHIP_MOBILE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Check for package.json changes
        id: changed-files
        run: |
          set -euo pipefail

          # Determine base and head commits based on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            echo "Checking PR: comparing $BASE_SHA...$HEAD_SHA"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            echo "Checking push: comparing $BASE_SHA...$HEAD_SHA"
          fi

          # Run the Python script to detect dependency changes
          OUTPUT=$(python3 .github/scripts/detect_package_changes.py "$BASE_SHA" "$HEAD_SHA")

          # Parse the output
          ANY_CHANGED=$(echo "$OUTPUT" | grep "any_changed=" | cut -d= -f2)
          echo "any_changed=$ANY_CHANGED" >> "$GITHUB_OUTPUT"

          # Extract alert lines between markers
          ALERT_LINES=$(echo "$OUTPUT" | sed -n '/=== ALERT_LINES ===/,/=== END_ALERT_LINES ===/p' | grep -v "===" || true)

          echo "alert_lines<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ALERT_LINES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Print the status messages (they're in the output)
          echo "$OUTPUT" | grep -E "(✅|❌)"

      - name: Detect whether repository has Node packages
        id: detect-node
        run: |
          # Detect presence of package.json files tracked in the repo
          set -euo pipefail
          if git ls-files | grep -q 'package\.json$'; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug changed files output
        run: |
          echo "The value of 'any_changed' is ${{ steps.changed-files.outputs.any_changed }}"
          echo "The value of 'has_node' is ${{ steps.detect-node.outputs.has_node }}"

      - name: Cache uv installation
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cache/uv
          key: ${{ runner.os }}-uv-guarddog-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-uv-guarddog-

      - name: Install uv for GuardDog
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if ! command -v uv &> /dev/null; then
            echo "🔄 Installing uv (will be cached for next run)..."
            curl -LsSf https://astral.sh/uv/install.sh | sh
          else
            echo "✅ Using cached uv installation"
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create workflow summary
        run: |
          echo "# 📦 Package Change Detection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.changed-files.outputs.any_changed }}" == "true" ]; then
            echo "## ⚠️ Dependency Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** Package dependencies have been modified and require approval." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Changes:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.changed-files.outputs.alert_lines }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Extract package names and versions, then fetch npm info
            echo "### 📋 Package Information" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Parse alert_lines to extract package names and versions
            ALERT_LINES="${{ steps.changed-files.outputs.alert_lines }}"

            # Extract package info using grep and awk
            while IFS= read -r line; do
              # Extract package name from the alert line
              PKG_NAME=$(echo "$line" | grep -oP '(dependencies|devDependencies|peerDependencies|optionalDependencies)\.\K[^ ]+' || true)
              PKG_FILE=$(echo "$line" | cut -d: -f1)

              if [ -n "$PKG_NAME" ] && [ "$PKG_NAME" != "version" ] && [ "$PKG_NAME" != "name" ]; then
                # Read the actual version from package.json for this package
                ACTUAL_VERSION=$(jq -r ".dependencies[\"$PKG_NAME\"] // .devDependencies[\"$PKG_NAME\"] // .peerDependencies[\"$PKG_NAME\"] // .optionalDependencies[\"$PKG_NAME\"] // \"\"" "$PKG_FILE")

                # Strip semver prefix (^, ~, >=, etc) to get clean version number
                CLEAN_VERSION=$(echo "$ACTUAL_VERSION" | sed 's/^[^0-9]*//')

                echo "<details>" >> $GITHUB_STEP_SUMMARY
                echo "<summary><strong>📦 $PKG_NAME</strong> @ $ACTUAL_VERSION</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY

                # Run npm info and capture output
                if [ -n "$CLEAN_VERSION" ]; then
                  {
                    echo "📌 Scanning version: $CLEAN_VERSION"
                    echo "   (from package.json: $ACTUAL_VERSION)"
                    echo ""
                    NPM_OUTPUT=$(npm info "$PKG_NAME@$CLEAN_VERSION" 2>&1)
                    # Show npm output but filter confusing "latest:" line
                    echo "$NPM_OUTPUT" | grep -v "^latest:" || echo "$NPM_OUTPUT"
                  } >> $GITHUB_STEP_SUMMARY
                else
                  npm info "$PKG_NAME" 2>&1 >> $GITHUB_STEP_SUMMARY
                fi

                echo '```' >> $GITHUB_STEP_SUMMARY

                # Add helpful links for review
                {
                  echo ""
                  echo "**🔗 Review Links:**"
                  echo "- [npm Package Page](https://www.npmjs.com/package/$PKG_NAME/v/$CLEAN_VERSION)"
                  echo "- [All Versions](https://www.npmjs.com/package/$PKG_NAME?activeTab=versions)"
                  echo "- [npm Trends](https://npmtrends.com/$PKG_NAME)"
                  echo "- [Snyk Advisor](https://snyk.io/advisor/npm-package/$PKG_NAME)"

                  # Try to extract GitHub repo URL from npm output
                  REPO_URL=$(echo "$NPM_OUTPUT" | grep -oP "https://github.com/[^\s]+" | head -1 || echo "")
                  if [ -n "$REPO_URL" ]; then
                    echo "- [GitHub Repository]($REPO_URL)"
                  fi
                } >> $GITHUB_STEP_SUMMARY

                echo "</details>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done < <(echo "$ALERT_LINES" | grep -E "(added|changed|removed)")

            # GuardDog Security Scan - Always show this section
            echo "### 🔒 GuardDog Security Analysis" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Check if there are any packages to scan
            PACKAGES_TO_SCAN=$(echo "$ALERT_LINES" | grep -E "(added|changed)" | grep -oP '(dependencies|devDependencies|peerDependencies|optionalDependencies)\.\K[^ ]+' | grep -v "^$" || true)

            if [ -z "$PACKAGES_TO_SCAN" ]; then
              echo "ℹ️ No npm packages to scan (only metadata or script changes detected)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            else
              # Scan each package with GuardDog
              while IFS= read -r line; do
                # Extract package name from the alert line
                PKG_NAME=$(echo "$line" | grep -oP '(dependencies|devDependencies|peerDependencies|optionalDependencies)\.\K[^ ]+' || true)
                PKG_FILE=$(echo "$line" | cut -d: -f1)

                # Only skip package.json metadata fields, NOT dependency version changes
                if [ -n "$PKG_NAME" ]; then
                # Read the actual version from package.json for this package
                ACTUAL_VERSION=$(jq -r ".dependencies[\"$PKG_NAME\"] // .devDependencies[\"$PKG_NAME\"] // .peerDependencies[\"$PKG_NAME\"] // .optionalDependencies[\"$PKG_NAME\"] // \"\"" "$PKG_FILE")

                # Strip semver prefix (^, ~, >=, etc) to get clean version number
                CLEAN_VERSION=$(echo "$ACTUAL_VERSION" | sed 's/^[^0-9]*//')

                echo "<details>" >> $GITHUB_STEP_SUMMARY
                echo "<summary><strong>🔍 $PKG_NAME</strong> @ $ACTUAL_VERSION - Security Scan</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY

                # Run GuardDog scan and capture output
                if [ -n "$CLEAN_VERSION" ]; then
                  {
                    echo "🎯 **GuardDog scanning version: $CLEAN_VERSION**"
                    echo "   (from package.json: $ACTUAL_VERSION)"
                    echo ""
                    echo '```'
                    SCAN_OUTPUT=$(uvx guarddog npm scan "$PKG_NAME" --version "$CLEAN_VERSION" 2>&1 || true)

                    # Check if any issues were found
                    ISSUES=$(echo "$SCAN_OUTPUT" | grep -i "found.*indicator\|malicious\|suspicious\|warning" | grep -v "0 issues\|No suspicious" || true)

                    if [ -n "$ISSUES" ]; then
                      echo "⚠️ **Potential Issues Detected**"
                      echo ""
                      # Show all output except installation logs
                      echo "$SCAN_OUTPUT" | grep -v "Installing\|Downloading\|Resolving\|Prepared\|Audited\|packages in"
                    else
                      echo "✅ **Clean - No malicious indicators detected**"
                      INSTALL_INFO=$(echo "$SCAN_OUTPUT" | grep "Installed.*packages in" || echo "")
                      if [ -n "$INSTALL_INFO" ]; then
                        echo ""
                        echo "$INSTALL_INFO"
                      fi
                    fi
                    echo '```'

                    # Summary of findings
                    echo ""
                    if [ -n "$ISSUES" ]; then
                      echo "⚠️ **GuardDog detected potential indicators** - Review the output above and use your judgment based on what this package is supposed to do."
                    else
                      echo "✅ **GuardDog found no malicious indicators**"
                    fi
                  } >> $GITHUB_STEP_SUMMARY
                else
                  {
                    echo '```'
                    SCAN_OUTPUT=$(uvx guarddog npm scan "$PKG_NAME" 2>&1 || true)

                    # Check if any issues were found
                    ISSUES=$(echo "$SCAN_OUTPUT" | grep -i "found.*indicator\|malicious\|suspicious\|warning" | grep -v "0 issues\|No suspicious" || true)

                    if [ -n "$ISSUES" ]; then
                      echo "⚠️ **Potential Issues Detected**"
                      echo ""
                      echo "$SCAN_OUTPUT" | grep -v "Installing\|Downloading\|Resolving\|Prepared\|Audited\|packages in"
                    else
                      echo "✅ **Clean - No malicious indicators detected**"
                      INSTALL_INFO=$(echo "$SCAN_OUTPUT" | grep "Installed.*packages in" || echo "")
                      if [ -n "$INSTALL_INFO" ]; then
                        echo ""
                        echo "$INSTALL_INFO"
                      fi
                    fi
                    echo '```'

                    # Summary
                    echo ""
                    if [ -n "$ISSUES" ]; then
                      echo "⚠️ **GuardDog detected potential indicators** - Review the findings above."
                    else
                      echo "✅ **GuardDog found no malicious indicators**"
                    fi
                  } >> $GITHUB_STEP_SUMMARY
                fi

                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "</details>" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                fi
              done < <(echo "$ALERT_LINES" | grep -E "(added|changed)")
            fi

            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📋 Review Checklist" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Before approving, verify:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] Package versions match what you intended to add/update" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] npm info shows no DEPRECATED warnings" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] GuardDog findings (if any) are expected for this package type" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] Review links show the package has good reputation and maintenance" >> $GITHUB_STEP_SUMMARY
            echo "- [ ] You recognize this package change and why it's being made" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**If all checks pass:** Approve the 'Request bypass approval' job below" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
            echo "- [Approve Deployment (bypass-package-lock)](${{ github.server_url }}/${{ github.repository }}/deployments/activity_log?environment=bypass-package-lock)" >> $GITHUB_STEP_SUMMARY
            echo "- [View This Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**If uncertain:** Click the review links above to research the package, or consult your security team" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ No Dependency Changes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** No package dependency changes detected." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Either package.json was not modified, or only non-dependency fields (like scripts) were changed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Result:** No approval required, workflow will proceed automatically." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** \`${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  remove_stale_approval_label:
    name: Remove stale approval label
    runs-on: ubuntu-latest
    needs: [check_for_locked_file_changes, check_approval_label]
    # Remove label if new package changes detected on a PR that was previously approved
    if: github.event_name == 'pull_request' && needs.check_for_locked_file_changes.outputs.any_changed == 'true' && needs.check_approval_label.outputs.has_approval_label == 'true'
    steps:
      - name: Remove package-scan-complete label due to new changes
        env:
          GITHUB_TOKEN: ${{ needs.check_for_locked_file_changes.outputs.app_token }}
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "⚠️ New package changes detected on previously approved PR #$PR_NUMBER"
          echo "Removing 'package-scan-complete' label to require re-approval"
          curl -s -X DELETE \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/package-scan-complete" || true

  request_bypass_approval:
    name: Request bypass approval
    runs-on: ubuntu-latest
    needs: [check_for_locked_file_changes, check_approval_label, remove_stale_approval_label]
    # Run approval when:
    # 1. Package changes detected AND node present AND (no label exists OR label was just removed)
    if: |
      always() &&
      needs.check_for_locked_file_changes.outputs.any_changed == 'true' &&
      needs.check_for_locked_file_changes.outputs.has_node == 'true' &&
      (needs.check_approval_label.outputs.has_approval_label == 'false' || needs.remove_stale_approval_label.result == 'success')
    # PRODUCTION: Environment protection enabled - requires approval from authorized reviewers
    environment: bypass-package-lock
    steps:
      - run: echo "Approval required for package dependency changes. An admin from the required group must approve this step."

      - name: Add package-scan-complete label after approval
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ needs.check_for_locked_file_changes.outputs.app_token }}
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.pull_request.number }}

          echo "✅ Approval granted - adding 'package-scan-complete' label to PR #$PR_NUMBER"

          # Attempt to add the label
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" \
            -d '{"labels":["package-scan-complete"]}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Label successfully added"
            exit 0
          else
            echo "❌ Failed to add label (HTTP $HTTP_CODE)"
            echo "Response: $BODY"

            # Cleanup: Remove the label if it somehow exists
            echo "🧹 Attempting cleanup - removing any existing label"
            curl -s -X DELETE \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/package-scan-complete" || true

            echo "❌ Label addition failed. Please re-run the workflow."
            exit 1
          fi

  notify_package_change:
    name: Notify package.json change
    needs: check_for_locked_file_changes
    if: needs.check_for_locked_file_changes.outputs.any_changed == 'true' && needs.check_for_locked_file_changes.outputs.has_node == 'true'
    uses: ./.github/workflows/start_slack_thread.yml
    secrets: inherit
    with:
      channel_name: va-mobile-app-alerts
      message: |
        :package: *Package changes detected*
        ```
        ${{ needs.check_for_locked_file_changes.outputs.alert_lines }}
        ```
        <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View security scan results> | <${{ github.server_url }}/${{ github.repository }}/deployments/activity_log?environment=bypass-package-lock|Approve deployment>

  security-check:
    name: security-check
    runs-on: ubuntu-latest
    needs: check_for_locked_file_changes
    if: |
      always() && needs.check_for_locked_file_changes.outputs.any_changed == 'false'
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLAGSHIP_MOBILE_APP_ID }}
          private-key: ${{ secrets.FLAGSHIP_MOBILE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - uses: gensecaihq/Shai-Hulud-2.0-Detector@v1
        id: security_scan
        with:
          fail-on-critical: true

  security-check-with-approval:
    name: security-check
    runs-on: ubuntu-latest
    needs: [check_for_locked_file_changes, request_bypass_approval]
    if: |
      always() && needs.check_for_locked_file_changes.outputs.any_changed == 'true' && needs.request_bypass_approval.result == 'success'
    steps:
      - name: Generate token
        id: generate_token_approved
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLAGSHIP_MOBILE_APP_ID }}
          private-key: ${{ secrets.FLAGSHIP_MOBILE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token_approved.outputs.token }}

      - uses: gensecaihq/Shai-Hulud-2.0-Detector@v1
        id: security_scan_approved
        with:
          fail-on-critical: true
