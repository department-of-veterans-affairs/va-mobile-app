# On demand builds that can be run via GitHub UI at
# https://github.com/department-of-veterans-affairs/va-mobile-app/actions/workflows/on_demand_build.yml

name: '[Build] On Demand Build'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      notes:
        description: Notes
        required: true

jobs:
  queue_build:
    name: Queue Build
    uses: ./.github/workflows/queue_builds.yml
    secrets: inherit
  sanitize_inputs:
    name: Sanitize inputs
    runs-on: ubuntu-latest
    outputs:
      notes_sanitized: ${{ steps.sanitize.outputs.notes_sanitized }}
    steps:
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        env:
          APP_CLIENT_SECRET_PROD: ${{ secrets.APP_CLIENT_SECRET_PROD}}
          APPSTORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          VA_MOBILE_ROBOT_GITHUB_SSH_KEY: ${{ secrets.VA_MOBILE_ROBOT_GITHUB_SSH_KEY }}
          APPSTORE_CONNECT_BASE64: ${{ secrets.APPSTORE_CONNECT_BASE64 }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
          # Android Key Store Key Alias
          ANDROID_KS_KEY_ALIAS: ${{ secrets.ANDROID_KS_KEY_ALIAS }}
          # Android Key Store Key Alias Password
          ANDROID_KS_KEY_PW: ${{ secrets.ANDROID_KS_KEY_PW }}
          # Android Key Store Key Password
          ANDROID_KS_PW: ${{ secrets.ANDROID_KS_PW }}
          # App ID for Android project in Firebase
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          # Filepath for firebase distribution key. Also used by fastlane
          FIREBASE_DIST_KEY_FILEPATH: ${{ secrets.FIREBASE_DIST_KEY_FILEPATH }}
          GOOGLE_KS: ${{ secrets.GOOGLE_KS }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          FIREBASE_DIST_FILE_BASE64: ${{ secrets.FIREBASE_DIST_FILE_BASE64 }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      - id: sanitize
        env:
          NOTES_INPUT: ${{ github.event.inputs.notes }}
        run: |
          # Remove problematic characters: backticks, quotes, commas, slashes, apostrophes, question marks, exclamation points
          SANITIZED=$(echo "$NOTES_INPUT" | tr -d '`"'"'"',/\\?!')
          echo "notes_sanitized=$SANITIZED" >> "$GITHUB_OUTPUT"
  start_slack_thread:
    name: Start Slack thread
    needs: [queue_build, sanitize_inputs]
    uses: ./.github/workflows/start_slack_thread.yml
    secrets: inherit
    with:
      channel_name: va-mobile-build-alerts
      message: 'On demand build started by ${{ github.actor }}: "${{ needs.sanitize_inputs.outputs.notes_sanitized }}"  (:git: `${{ github.ref_name }}`). This process may take a while. See :thread: or <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|workflow run> for results.'
  ios:
    name: iOS On Demand Build
    needs: [queue_build, start_slack_thread, sanitize_inputs]
    uses: ./.github/workflows/build_ios.yml
    secrets: inherit
    with:
      lane: on_demand
      ref: ${{ github.ref_name }}
      environment: ${{ inputs.environment }}
      notes: ${{ needs.sanitize_inputs.outputs.notes_sanitized }}
      slack_thread_ts: ${{ needs.start_slack_thread.outputs.thread_ts }}
  android:
    name: Android On Demand Build
    needs: [queue_build, start_slack_thread, sanitize_inputs]
    uses: ./.github/workflows/build_android.yml
    secrets: inherit
    with:
      lane: on_demand
      ref: ${{ github.ref_name }}
      environment: ${{ inputs.environment }}
      notes: ${{ needs.sanitize_inputs.outputs.notes_sanitized }}
      slack_thread_ts: ${{ needs.start_slack_thread.outputs.thread_ts }}
