name: '[Admin] Notify Slack of new Onboarding requests'

on: workflow_call

jobs:
  get_slack_id_user1:
    name: Get Slack ID for User1
    uses: ./.github/workflows/get-slack-user-id.yml
    secrets: inherit
    with:
      git_handle: matthew-df

  get_slack_id_user2:
    name: Get Slack ID for User2
    uses: ./.github/workflows/get-slack-user-id.yml
    secrets: inherit
    with:
      git_handle: matthew-df

  notify_slack:
    name: Notify Both Slack Users
    needs: [get_slack_id_user1, get_slack_id_user2]
    uses: ./.github/workflows/start_slack_thread.yml
    secrets: inherit
    with:
      channel_name: va-mobile-sandbox
      message: '📱 New Onboarding request for: *${{ github.event.issue.title }}* <@${{ needs.get_slack_id_user1.outputs.slackId }}> <@${{ needs.get_slack_id_user2.outputs.slackId }}> | <${{ github.event.issue.html_url }}|View Issue>'
