# DESCRIPTION: Verifies that changes to native Android files do not break the
# Android build process. Triggers on PRs that modify files under VAMobile/android/
# and runs a test-only Android build via the reusable build_android workflow.
name: '[Code Quality] Check Native Android Builds'

on:
  pull_request:
    paths:
      - "VAMobile/android/**"

jobs:
  android_native_build:
    name: Android Test Build
    uses: ./.github/workflows/build_android.yml
    secrets: inherit
    with:
      lane: test_build_only
