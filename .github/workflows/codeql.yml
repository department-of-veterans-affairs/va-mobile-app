# Runs GitHub CodeQL security analysis on JavaScript code. Triggers
# on pushes and PRs to develop and weekly on a schedule. Initializes CodeQL,
# autobuilds the project, and performs the analysis.

---
name: "[Code Quality] CodeQL (JavaScript)"
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  schedule:
    - cron: '27 2 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
