# DESCRIPTION: Verifies that changes to native iOS files do not break the iOS
# build process. Triggers on PRs that modify files under VAMobile/ios/ and runs
# a test-only iOS build via the reusable build_ios workflow.
name: '[Code Quality] Check Native iOS Builds'

on:
  pull_request:
    paths:
      - 'VAMobile/ios/**'

jobs:
  ios_native_build:
    name: iOS Test Build
    uses: ./.github/workflows/build_ios.yml
    secrets: inherit
    with:
      lane: test_build_only
