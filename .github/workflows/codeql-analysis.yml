# DESCRIPTION: Runs GitHub CodeQL static analysis on Ruby, JavaScript, and Python
# code. Triggers on pushes and PRs to develop, weekly on a schedule, and manually.
# Uses the VA's shared codeql-tools action for scanning.

name: '[Code Quality] CodeQL'
'on':
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  schedule:
    - cron: 47 14 * * 1
  workflow_dispatch: null
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    concurrency: ${{ github.workflow }}-${{ matrix.language }}-${{ github.ref }}
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - ruby
          - javascript
          - python
    steps:
      - name: Run Code Scanning
        uses: department-of-veterans-affairs/codeql-tools/codeql-analysis@main
        with:
          language: ${{ matrix.language }}
