# DESCRIPTION: Reusable workflow that checks whether a file count or character
# count exceeds an app store limit. Called by app_store_checks_apple and
# app_store_checks_google to validate screenshots and metadata sizes.

name: '[Release] Check Max File/Character Size'

on:
  workflow_call:
    inputs:
      working_dir:
        description: 'Directory to run the counting function in'
        required: true
        type: string
      max_size:
        description: 'Maximum allowed count (files or characters)'
        required: true
        type: string
      counting_function:
        description: 'Shell command that outputs the count to check against max_size'
        required: true
        type: string

jobs:
  check_max_files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          if [[ $(${{ inputs.counting_function }}) -gt ${{ inputs.max_size }} ]]
          then
            echo "PR exceeds app store limits of ${{ inputs.max_size }} for this check"
            exit 1
          fi
        working-directory: ${{ inputs.working_dir }}
