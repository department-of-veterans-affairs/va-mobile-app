# Placeholder onboarding workflow that triggers when an issue is
# labeled with 'onboarding'. Currently logs the issue event; Slack notification
# logic is commented out pending future implementation.

name: '[Admin] Onboarding Issue Handler'
on:
  issues:
    types: [labeled]

jobs:
  start-worlflow:
    if: contains(github.event.issue.labels.*.name, 'onboarding') && !contains(github.event.issue.labels.*.name, 'processed') && !contains(github.event.issue.labels.*.name, 'complete')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Step 1
        run: echo ${{ github.event.issue }}
