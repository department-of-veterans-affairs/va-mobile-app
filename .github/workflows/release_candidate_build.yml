# Builds release candidate (RC) staging builds for iOS and Android,
# triggered by an RC-v*.*.* tag pushed from new_release_branch.yml at the end of
# each sprint. Queues the build, notifies Slack, and runs iOS and Android RC builds
# in parallel for QA validation and regression testing.

name: '[Build] Release Candidate Build'

on:
  push:
    tags:
      # Matches RC-vX.X.X-date-time e.g. RC-v2.0.0-032923-0636
      - 'RC-v[0-9]+.[0-9]+.[0-9]+-[0-9]+[0-9]+[0-9]+-[0-9]+[0-9]+'

jobs:
  queue_build:
    name: Queue Build
    uses: ./.github/workflows/queue_builds.yml
    secrets: inherit
  start_slack_thread:
    name: Start Slack thread
    needs: queue_build
    uses: ./.github/workflows/start_slack_thread.yml
    secrets: inherit
    with:
      message: 'Release Candidate build process starting. This build is a staging build for QA to validate and do regression testing on. Please see :thread: for results. This process may take a while.'
  ios:
    name: iOS RC Build
    needs: start_slack_thread
    uses: ./.github/workflows/build_ios.yml
    secrets: inherit
    with:
      lane: rc
      slack_thread_ts: ${{needs.start_slack_thread.outputs.thread_ts}}
  android:
    name: Android RC Build
    needs: start_slack_thread
    uses: ./.github/workflows/build_android.yml
    secrets: inherit
    with:
      lane: rc
      slack_thread_ts: ${{needs.start_slack_thread.outputs.thread_ts}}
