# A skip workflow for iOS native checks.
# This workflow triggers when VAMobile/ios/** files are NOT modified.
# It calls a reusable no-op workflow to immediately report success, ensuring that
# PRs do not hang if this status check is marked as "Required" in branch protection rules.

name: '[Code Quality] Check Native iOS Builds'

on:
  pull_request:
    paths:
      - '!VAMobile/ios/**'

jobs:
  ios_native_build:
    name: iOS Test Build
    uses: ./.github/workflows/native_build_check_ios_reusable.yml
