name: Devops Change Template
description: Template for requesting a Devops related change for the application or infrastructure
title: Devops - [Describe issue]
labels: devops
projects: ['department-of-veterans-affairs/1616']

body:
  - type: dropdown
    id: change-type
    attributes:
      label: Type of change
      description: What type of change are you completing
      options:
        - Update Existing Automation
        - Documentation Change
        - Template Change
        - Add new automation functionality
        - Fix Automation Bug
        - AWS Access
        - Github Migration

  - type: dropdown
    id: whats-changing
    attributes:
      label: What is changing
      description: 'What systems/scripts are changing?'
      options:
        - Github Actions
        - Github Repo
        - Documentation
        - AWS Infrastructure
        - Fastlane
        - Bash Scripts
        - Issue Templates
        - Other

  - type: input
    id: change-other
    attributes:
      label: If other, please specify
      description: 'Describe other change'

  - type: textarea
    id: work-done
    attributes:
      label: Work Being Done
      description: 'What is the work being done with this change?'

  - type: textarea
    id: ac
    attributes:
      label: Acceptance Criteria
      description: 'What is the acceptance criteria?'
      value: |
        - [ ] AC1
        - [ ] AC2
